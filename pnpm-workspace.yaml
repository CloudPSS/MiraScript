packages:
  - packages/*

ignoredBuiltDependencies:
  - eslint-config-prettier
  - esbuild
  - core-js
  - core-js-pure

onlyBuiltDependencies:
  - '@swc/core'
  - '@vscode/vsce-sign'
  - keytar

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*commitlint*'
  - lint-staged
  - '@typescript/*'

shellEmulator: true
