packages:
  - packages/*

ignoredBuiltDependencies:
  - eslint-config-prettier
  - esbuild
  - core-js
  - core-js-pure

onlyBuiltDependencies:
  - '@swc/core'

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*commitlint*'
  - lint-staged
  - '@typescript/*'
  # website
  - '@rspack/core'
  - 'unist-util-visit'
  - '@types/react'
  - '@types/react-dom'
  - '@types/mdast'
  - '@types/hast'
  - 'react'
  - 'react-dom'
  - 'prism-react-renderer'
  - '@docusaurus/*'

shellEmulator: true
