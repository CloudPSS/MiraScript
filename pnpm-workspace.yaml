packages:
  - packages/*

allowBuilds:
  '@swc/core': true
  core-js: false
  esbuild: false

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*commitlint*'
  - lint-staged
  - '@typescript/*'
  # website
  - '@rspack/core'
  - 'unist-util-visit'
  - '@types/react'
  - '@types/react-dom'
  - '@types/mdast'
  - '@types/hast'
  - 'react'
  - 'react-dom'
  - 'prism-react-renderer'
  - '@docusaurus/*'

shellEmulator: true
