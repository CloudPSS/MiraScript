name: Release

on:
  push:
    tags: ['*']

jobs:
  build:
    permissions:
      contents: read

    uses: ./.github/workflows/build.yml
    secrets: inherit

  publish-npm:
    needs: build

    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Publish to npm
        run: |
          TAG=latest
          if [[ "${GITHUB_REF}" == *"-"* ]]; then
            TAG=next
          fi
          echo "Publishing with tag: $TAG"
          pnpm -r publish --no-git-checks --access public --registry https://registry.npmjs.org/ --tag $TAG --provenance

      - name: Sync to npmmirror
        run: |
          for package_dir in packages/*; do
            if [[ ! -d "$package_dir" ]]; then
              continue
            fi

            package_json="$package_dir/package.json"
            if [[ ! -f "$package_json" ]]; then
              continue
            fi

            is_private=$(jq -r '.private // false' "$package_json")
            if [[ "$is_private" == "true" ]]; then
              continue
            fi

            package_name=$(jq -r '.name // empty' "$package_json")
            if [[ -z "$package_name" ]]; then
              continue
            fi

            echo "Syncing $package_name"
            response=$(curl -fsSL -X PUT "https://registry-direct.npmmirror.com/$package_name/sync")
            ok=$(jq -r '.ok' <<< "$response")

            if [[ "$ok" != "true" ]]; then
              jq -r '(.error // "Sync failed"), (.reason // empty)' <<< "$response" >&2
              exit 1
            fi

            log_id=$(jq -r '.logId' <<< "$response")
            echo "OK, see https://registry-direct.npmmirror.com/-/package/$package_name/syncs/$log_id/log"
          done

  build-vscode:
    needs: [build, publish-npm]

    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Build vscode package
        run: |
          mkdir -p ~/vscode-build
          cp .npmrc ~/vscode-build/

          cd packages/vscode
          pnpm build
          pnpm pack --out mirascript-vscode.tgz
          tar -xzf mirascript-vscode.tgz --strip-components=1 -C ~/vscode-build/

          cd ~/vscode-build
          npm install --omit=dev
          npm pkg set name="mirascript"
          vsce package

      - name: Upload vscode artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-package
          path: ~/vscode-build/*.vsix
          if-no-files-found: error

  publish-vscode:
    needs: build-vscode

    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - name: Download vscode artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-package

      - name: Publish to Open VSX
        run: npx ovsx         publish -p ${{ secrets.OVSX_PAT }} -i *.vsix ${{ contains(github.ref, '-') && '--pre-release' || '' }}

      - name: Publish to Visual Studio Marketplace
        run: npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} -i *.vsix ${{ contains(github.ref, '-') && '--pre-release' || '' }}

  publish-github:
    needs: [build, build-vscode]

    permissions:
      contents: write

    runs-on: ubuntu-latest
    steps:
      - name: Download website artifact
        uses: actions/download-artifact@v8
        with:
          name: website
          path: website/

      - name: Pack website release artifact
        run: |
          tar -czf website.tar.gz -C website .

      - name: Download vscode artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-package

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: '*.vsix,website.tar.gz'
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref, '-') }}
