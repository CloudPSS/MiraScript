name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    permissions:
      contents: read

    uses: ./.github/workflows/build.yml
    secrets: inherit

  publish-npm:
    needs: build

    permissions:
      contents: read
      id-token: write

    environment:
      name: npm
      url: https://www.npmjs.com/package/@mirascript/mirascript

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/actions/install
        with:
          skip-pnpm-install: true

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Publish to npm
        env:
          TAG: ${{ contains(github.ref, '-') && 'next' || 'latest' }}
        run: |
          cd packages/napi
          pnpm install -g @napi-rs/cli
          napi create-npm-dirs
          napi artifacts --output-dir dist
          napi pre-publish --tag-style npm --no-gh-release --skip-optional-publish

          for target in npm/*; do
            if [[ -d "$target" ]]; then
              cd "$target"
              npm publish --access public --registry https://registry.npmjs.org/ --tag $TAG
              cd -
            fi
          done

          cd ../..
          pnpm -r publish --no-git-checks --access public --registry https://registry.npmjs.org/ --tag $TAG

      - name: Sync to npmmirror
        run: |
          for package_dir in packages/*; do
            if [[ ! -d "$package_dir" ]]; then
              continue
            fi

            package_json="$package_dir/package.json"
            if [[ ! -f "$package_json" ]]; then
              continue
            fi

            is_private=$(jq -r '.private // false' "$package_json")
            if [[ "$is_private" == "true" ]]; then
              continue
            fi

            package_name=$(jq -r '.name // empty' "$package_json")
            if [[ -z "$package_name" ]]; then
              continue
            fi

            echo "Syncing $package_name"
            response=$(curl -fsSL -X PUT "https://registry-direct.npmmirror.com/$package_name/sync")
            ok=$(jq -r '.ok' <<< "$response")

            if [[ "$ok" != "true" ]]; then
              jq -r '(.error // "Sync failed"), (.reason // empty)' <<< "$response" >&2
              exit 1
            fi

            log_id=$(jq -r '.logId' <<< "$response")
            echo "OK, see https://registry-direct.npmmirror.com/-/package/$package_name/syncs/$log_id/log"
          done

  publish-pypi:
    needs: build

    permissions:
      contents: read
      id-token: write

    environment:
      name: PyPI
      url: https://pypi.org/project/mirascript/

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-artifacts
          path: crates/python/dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: crates/python/dist

  build-vscode:
    needs: [build, publish-npm]

    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Build vscode package
        run: |
          mkdir -p ~/vscode-build
          cp .npmrc ~/vscode-build/

          cd packages/vscode
          pnpm build
          pnpm pack --out mirascript-vscode.tgz
          tar -xzf mirascript-vscode.tgz --strip-components=1 -C ~/vscode-build/

          cd ~/vscode-build
          touch .vscodeignore # Make vsce happy
          npm install --omit=dev
          npm pkg set name="mirascript"
          npx @vscode/vsce package ${{ contains(github.ref, '-') && '--pre-release' || '' }}

      - name: Upload vscode artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-package
          path: ~/vscode-build/*.vsix
          if-no-files-found: error

  publish-vscode:
    needs: build-vscode

    strategy:
      matrix:
        marketplace:
          - name: Open VSX
            url: https://open-vsx.org/extension/CloudPSS/mirascript
            pkg: ovsx
            prerelease: true
          - name: Visual Studio Marketplace
            url: https://marketplace.visualstudio.com/items?itemName=CloudPSS.mirascript
            pkg: '@vscode/vsce'
            prerelease: false

    permissions:
      contents: read

    environment:
      name: ${{ matrix.marketplace.name }}
      url: ${{ matrix.marketplace.url }}

    runs-on: ubuntu-latest
    steps:
      - name: Download vscode artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-package

      - name: Publish to ${{ matrix.marketplace.name }}
        if: matrix.marketplace.prerelease || ! contains(github.ref, '-')
        run: npx ${{ matrix.marketplace.pkg }} publish -p ${{ secrets.PAT }} -i *.vsix

  publish-github:
    needs: build

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref, '-') }}
