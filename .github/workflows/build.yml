name: Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Set private token
        run: npm config set //packages.aliyun.com/60c179fc44816b8ed233a8bb/npm/npm-registry/:_authToken '${{ secrets.ALIYUN_NPM_TOKEN }}'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        uses: ./.github/actions/install

      # Build every package except vscode (built separately so that the vsix can be produced after npm packages are published on release).
      - name: Build
        run: |
          pnpm -r \
            --filter='!@mirascript/vscode' \
            run build

      - name: Test
        env:
          FORCE_COLOR: 1
        run: pnpm -r --if-present run test

      - name: Pack website artifact
        run: |
          mv -f packages/website/build/ website-build/
          mv -f packages/playground/dist/ website-build/debug/

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            packages/*/dist/
            packages/*/lib/
          if-no-files-found: error

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: website
          path: website-build/
          if-no-files-found: error
