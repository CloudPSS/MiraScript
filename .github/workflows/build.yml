name: Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Website build needs full history to generate date and author information

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}
          rust-targets: wasm32-unknown-unknown # Use wasm32-unknown-unknown to build wasm bindings
          tools: wasm-bindgen wasm-pack
          check-lockfile: true # Check once at here, and trust the lockfile for the rest of the workflow

      - name: Build
        run: pnpm -r run build

      - name: Pack website artifact
        run: |
          mv -f packages/website/build/ website-build/
          mv -f packages/playground/dist/ website-build/debug/

      - name: Build python sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/python

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: website
          path: website-build/
          if-no-files-found: error

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: |
            packages/*/dist/
            packages/*/lib/
            !**/*.node
          if-no-files-found: error

      - name: Upload python sdist
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: crates/python/dist/*
          if-no-files-found: error

  build-macos:
    needs: build
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-15-intel' || 'macos-latest' }}

    permissions:
      contents: read
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}
          rust-targets: ${{ matrix.arch }}-apple-darwin

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Build napi artifact
        run: |
          cd packages/napi
          pnpm run build --target ${{ matrix.arch }}-apple-darwin --release

      - uses: actions/setup-python@v7
        with:
          python-version: 3.14
      - name: Build python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-apple-darwin
          args: --release --out dist
          working-directory: crates/python

      - uses: actions/setup-python@v7
        with:
          python-version: 3.14t
      - name: Build free-threaded python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-apple-darwin
          args: --release --out dist -i python3.14t
          working-directory: crates/python

      - name: Upload napi artifact
        uses: actions/upload-artifact@v7
        with:
          name: napi-${{ matrix.arch }}-apple-darwin
          path: packages/napi/dist/*.node
          if-no-files-found: error

      - name: Upload python wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.arch }}-apple-darwin
          path: crates/python/dist/*.whl
          if-no-files-found: error

  build-windows:
    needs: build
    runs-on: ${{ matrix.arch == 'x86_64' && 'windows-latest' || 'windows-11-arm' }}

    permissions:
      contents: read
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}
          rust-targets: ${{ matrix.arch }}-pc-windows-msvc

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Build napi artifact
        run: |
          cd packages/napi
          pnpm run build --target ${{ matrix.arch }}-pc-windows-msvc --release

      - uses: actions/setup-python@v7
        with:
          python-version: 3.14
      - name: Build python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-pc-windows-msvc
          args: --release --out dist
          working-directory: crates/python

      - uses: actions/setup-python@v7
        with:
          python-version: 3.14t
      - name: Build free-threaded python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-pc-windows-msvc
          args: --release --out dist -i python3.14t
          working-directory: crates/python

      - name: Upload napi artifact
        uses: actions/upload-artifact@v7
        with:
          name: napi-${{ matrix.arch }}-pc-windows-msvc
          path: packages/napi/dist/*.node
          if-no-files-found: error

      - name: Upload python wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.arch }}-pc-windows-msvc
          path: crates/python/dist/*.whl
          if-no-files-found: error

  build-linux:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}
          rust-targets: ${{ matrix.arch }}-unknown-linux-gnu,${{ matrix.arch }}-unknown-linux-musl
          tools: cross

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Build gnu napi artifact
        run: |
          cd packages/napi
          pnpm run build --use-cross --target ${{ matrix.arch }}-unknown-linux-gnu --release

      - name: Build musl napi artifact
        run: |
          cd packages/napi
          pnpm run build --use-cross --target ${{ matrix.arch }}-unknown-linux-musl --release

      - name: Build gnu python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-unknown-linux-gnu
          args: --release --out dist
          working-directory: crates/python
          manylinux: ${{ matrix.arch == 'aarch64' && '2_28' || '2_17' }}

      - name: Build musl python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-unknown-linux-musl
          args: --release --out dist
          working-directory: crates/python
          manylinux: 'musllinux_1_2'

      - name: Build gnu free-threaded python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-unknown-linux-gnu
          args: --release --out dist -i python3.15t
          working-directory: crates/python
          manylinux: ${{ matrix.arch == 'aarch64' && '2_28' || '2_17' }}

      - name: Build musl free-threaded python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.arch }}-unknown-linux-musl
          args: --release --out dist -i python3.15t
          working-directory: crates/python
          manylinux: 'musllinux_1_2'

      - name: Upload napi artifact
        uses: actions/upload-artifact@v7
        with:
          name: napi-${{ matrix.arch }}-unknown-linux
          path: packages/napi/dist/*.node
          if-no-files-found: error

      - name: Upload python wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.arch }}-unknown-linux
          path: crates/python/dist/*.whl
          if-no-files-found: error

  build-all:
    needs: [build, build-macos, build-windows, build-linux]
    runs-on: ubuntu-slim

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Download napi artifact
        uses: actions/download-artifact@v8
        with:
          pattern: napi-*
          merge-multiple: true
          path: packages/napi/dist/

      - name: Reupload npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: |
            packages/*/dist/
            packages/*/lib/
          if-no-files-found: error
          overwrite: true

      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: python-*
          merge-multiple: true
          path: crates/python/dist/

      - name: Reupload python artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-artifacts
          path: crates/python/dist/*
          if-no-files-found: error

  test-node:
    needs: build-all
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
          - macos-15-intel
        node:
          - 'lts/-1'
          - 'lts/*'
          - 'latest'
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf input

      - name: Checkout
        uses: actions/checkout@v7

      - name: Install
        uses: ./.github/actions/install
        with:
          rust-targets: false
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}
          node-version: ${{ matrix.node }}
          pnpm-args: '--frozen-lockfile --ignore-scripts'

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Run mirascript tests
        run: |
          cd packages/mirascript
          pnpm run test

      - name: Run typed tests
        run: |
          cd packages/typed
          pnpm run test

  test-python:
    needs: build-all
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
          - macos-15-intel
        python:
          - '3.8'
          - '3.14'
          - '3.14t'
        include:
          - os: windows-latest
            python: '3.7'
          - os: windows-11-arm
            python: '3.11'
        exclude:
          - os: windows-11-arm
            python: '3.8'
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Configure Git
        run: |
          git config --global core.autocrlf input

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}

      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          name: python-artifacts
          path: python-artifacts/

      - name: Install wheels
        run: |
          pip install "typing-extensions>=4.7.1" "astunparse>=1.6.3;python_version<'3.9'" "maturin>=1.0,<2.0"
          pip install --pre --no-index --no-cache-dir --find-links ./python-artifacts mirascript

      - name: Run tests
        shell: bash
        run: |
          cd crates/python
          rm -rf ./mirascript
          python -m unittest -b -c tests.black_box -v
