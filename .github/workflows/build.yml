name: Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}

      - name: Build
        run: pnpm -r run build

      - name: Pack website artifact
        run: |
          mv -f packages/website/build/ website-build/
          mv -f packages/playground/dist/ website-build/debug/

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-package
          path: |
            packages/*/dist/
            packages/*/lib/
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: website
          path: website-build/
          if-no-files-found: error

  test:
    needs: build
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['lts/-1', 'lts/*', 'latest']
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install
        uses: ./.github/actions/install
        with:
          ALIYUN_NPM_TOKEN: ${{ secrets.ALIYUN_NPM_TOKEN }}
          pnpm-args: '--frozen-lockfile'
          node-version: ${{ matrix.node }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package
          path: packages/

      - name: Run tests
        env:
          FORCE_COLOR: 1
        run: pnpm -r --if-present run test
