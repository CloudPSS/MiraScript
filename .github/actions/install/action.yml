name: Install
description: Install all required tools and dependencies for building and testing MiraScript.

inputs:
  ALIYUN_NPM_TOKEN:
    description: 'The npm token for aliyun registry, used for installing dependencies with `@private/` scope.'
    required: true
  pnpm-args:
    description: 'Directly pass args to pnpm'
    required: false
    default: '--frozen-lockfile'
  node-version:
    description: 'The Node.js version to use. Default to the version specified in .nvmrc or package.json.'
    required: false
  rust-targets:
    description: 'Comma-separated list of Rust targets to install. Default to wasm32-unknown-unknown.'
    required: false
    default: 'wasm32-unknown-unknown'
  tools:
    description: 'Comma-separated list of additional tools to install with taiki-e/install-action. Default to empty.'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Set private token
      shell: bash
      run: |
        npm config set -L project '//packages.aliyun.com/60c179fc44816b8ed233a8bb/npm/npm-registry/:_authToken' '${{ inputs.ALIYUN_NPM_TOKEN }}'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - name: Setup tools
      uses: taiki-e/install-action@v2
      with:
        tool: wasm-bindgen wasm-pack ${{ inputs.tools }}

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        cache: true

    - name: Setup node
      uses: actions/setup-node@v6
      if: inputs.node-version != ''
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install dependencies
      shell: bash
      run: pnpm install ${{ inputs.pnpm-args }}
