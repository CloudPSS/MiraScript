<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bg)" />
  <!-- Code bracket left < -->
  <path d="M200 160 L120 256 L200 352" stroke="url(#accent)" stroke-width="36" stroke-linecap="round"
    stroke-linejoin="round" fill="none" />
  <!-- Code bracket right > -->
  <path d="M312 160 L392 256 L312 352" stroke="url(#accent)" stroke-width="36" stroke-linecap="round"
    stroke-linejoin="round" fill="none" />
  <!-- Star/sparkle in center -->
  <g transform="translate(256, 256)">
    <path d="M0 -40 L10 -10 L40 0 L10 10 L0 40 L-10 10 L-40 0 L-10 -10 Z" fill="white" opacity="0.95" />
  </g>
</svg>