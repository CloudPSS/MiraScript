<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="100" ry="100" fill="url(#bg)" />
  <!-- Code bracket left < -->
  <path d="M180 136 L90 256 L180 376" stroke="url(#accent)" opacity="0.9" stroke-width="45" stroke-linecap="round"
    stroke-linejoin="round" fill="none" />
  <!-- Code bracket right > -->
  <path d="M332 136 L422 256 L332 376" stroke="url(#accent)" opacity="0.9" stroke-width="45" stroke-linecap="round"
    stroke-linejoin="round" fill="none" />
  <!-- Star/sparkle in center -->
  <path transform="translate(256, 256)" d="M0 -80 L20 -20 L80 0 L20 20 L0 80 L-20 20 L-80 0 L-20 -20 Z"
    fill="url(#accent)" />
</svg>