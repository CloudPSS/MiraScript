injectionSelector: 'L:text.html.markdown'
scopeName: markdown.miratpl.codeblock
patterns:
  - include: '#miratpl-code-block'
repository:
  miratpl-code-block:
    patterns:
      - name: markup.fenced_code.block.markdown
        begin: (^|\G)(\s*)(\`{3,}|~{3,})\s*(?i:(miratpl|mirascript-template)(\s+[^`~]*)?$)
        end: (^|\G)(\2|\s{0,3})(\3)\s*$

        beginCaptures:
          3: { name: punctuation.definition.markdown }
          4: { name: fenced_code.block.language.markdown }
          5: { name: fenced_code.block.language.attributes.markdown }
        endCaptures:
          3: { name: punctuation.definition.markdown }
        patterns:
          - name: meta.embedded.block.miratpl
            contentName: string.miratpl
            begin: (^|\G)(\s*)(.*)
            while: (^|\G)(?!\s*([`~]{3,})\s*$)
            patterns:
              - name: string.miratpl
