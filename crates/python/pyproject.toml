[build-system]
requires = ["maturin==1.7.5"]
build-backend = "maturin"

[project]
name = "mirascript"
version = "0.1.12"
requires-python = ">=3.7"
description = "MiraScript 的 Python 绑定允许在 Python 中使用 MiraScript 编译器。它提供了一个简单的接口来编译 MiraScript 脚本，并返回编译结果和诊断信息。"
readme = "README.md"
authors = [ { name = "CloudPSS", email = "zhangdaming@cloudpss.net" } ]
license = { text = "MIT" }
classifiers = [
    "Programming Language :: Rust",
     "Programming Language :: Python :: 3",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
   
]
keywords = ["MiraScript", "CloudPSS"]
dependencies = []
[tool.maturin]
bindings = "pyo3"
features = ["pyo3/extension-module"]